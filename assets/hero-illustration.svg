    <path d="M1280,140 L1280,180 M1310,120 L1310,200 M1340,150 L1340,170 M1370,100 L1370,220
             M1400,130 L1400,190 M1430,90 L1430,230 M1460,130 L1460,190 M1490,150 L1490,170
             M1520,70 L1520,250 M1550,130 L1550,190"/>
